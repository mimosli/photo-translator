<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Rollercoaster Life – Français</title>
  <style>
    :root{
      --bg:#06130f; --panel:#0b1f18; --panel-2:#0e2a20;
      --text:#fff; --muted:#c7d3cf; --border:rgba(255,255,255,.10);
      --pink:#ff4fb8; --red:#ff3b3b; --gold:#f7c948;
      --shadow:0 18px 50px rgba(0,0,0,.45);
      --radius:18px;
      --focus:0 0 0 3px rgba(247,201,72,.25);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(255,79,184,.18), transparent 55%),
        radial-gradient(900px 500px at 85% 20%, rgba(247,201,72,.16), transparent 55%),
        radial-gradient(900px 500px at 45% 95%, rgba(255,59,59,.12), transparent 55%),
        linear-gradient(180deg, #04110d, var(--bg));
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    .container{ max-width:980px; margin:0 auto; padding:clamp(16px,4vw,34px); }
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:clamp(16px,3.5vw,28px);
      backdrop-filter:blur(8px);
    }
    .lang-bar{ display:flex; gap:10px; margin-bottom:24px; }
    .lang-bar a{
      padding:6px 14px; border-radius:999px; font-size:13px; font-weight:600;
      border:1px solid rgba(255,255,255,.15); color:var(--muted); text-decoration:none;
    }
    .lang-bar a.active{ background:var(--gold); color:#1a1200; border-color:var(--gold); }
    .lang-bar a:hover:not(.active){ background:rgba(255,255,255,.08); color:#fff; }
    .hero{ display:grid; gap:14px; }
    .badge-row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(11,31,24,.65); color:var(--muted); font-size:13px;
    }
    .badge .dot{ width:8px; height:8px; border-radius:999px; background:var(--gold); box-shadow:0 0 0 3px rgba(247,201,72,.18); }
    h1{ margin:0; font-size:clamp(28px,5.5vw,48px); letter-spacing:-0.02em; line-height:1.1; }
    .subhead{ margin:0; color:var(--muted); line-height:1.6; font-size:clamp(14px,2.2vw,17px); max-width:70ch; }
    .ctaRow{ display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; }
    a{ color:inherit; text-decoration:none; }
    .btn{
      appearance:none; border:0; cursor:pointer; border-radius:14px;
      padding:13px 20px; font-weight:800; letter-spacing:.01em;
      font-size:15px; outline:none; display:inline-flex; align-items:center; gap:10px;
    }
    .btn-primary{ background:linear-gradient(180deg,var(--pink),#ff77cb); color:#1b0613; }
    .btn-ghost{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); color:var(--text); }
  </style>
</head>
<body>
  <main class="container">
    <nav class="lang-bar">
      <a href="/de">DE</a>
      <a href="/en">EN</a>
      <a href="/fr" class="active">FR</a>
    </nav>

    <section class="card hero">
      <div class="badge-row">
        <span class="badge"><span class="dot"></span> my rollercoaster life</span>
        <span class="badge">📖 Leila Frey</span>
      </div>

      <h1><!-- Titre / accroche --></h1>

      <p class="subhead">
        <!-- Description / texte d'accroche -->
      </p>

      <div class="ctaRow">
        <a class="btn btn-primary" href="/upload?camera=1">Traduire un poème ✨</a>
        <a class="btn btn-ghost" href="/upload">Ouvrir le traducteur</a>
      </div>
    </section>
  </main>
</body>
</html>
